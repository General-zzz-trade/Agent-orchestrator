<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Orchestrator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3e;
      --accent: #6c63ff;
      --accent-dim: #3d3880;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --text: #e2e8f0;
      --muted: #64748b;
      --font: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      height: 100vh;
      display: grid;
      grid-template-rows: 48px 1fr;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
    }
    header h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.03em; }
    header .badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 99px;
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid var(--accent);
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      margin-left: auto;
    }
    .status-dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); }

    /* ── Main Layout ── */
    .layout {
      display: grid;
      grid-template-columns: 340px 1fr 320px;
      overflow: hidden;
    }

    /* ── Panel base ── */
    .panel {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel:last-child { border-right: none; }
    .panel-header {
      padding: 10px 14px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    /* ── Left: Submit + History ── */
    .left-panel { gap: 0; }

    .goal-form { padding: 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .goal-form textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font);
      font-size: 12px;
      padding: 10px;
      resize: none;
      height: 90px;
      outline: none;
      transition: border-color 0.15s;
    }
    .goal-form textarea:focus { border-color: var(--accent); }
    .goal-form textarea::placeholder { color: var(--muted); }
    .form-row { display: flex; gap: 8px; margin-top: 8px; align-items: center; }
    .btn {
      padding: 7px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-family: var(--font);
      font-size: 12px;
      font-weight: 600;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-sm { padding: 4px 10px; font-size: 11px; }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    #api-key-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-family: var(--font);
      font-size: 11px;
      padding: 4px 8px;
      outline: none;
    }
    #api-key-input:focus { border-color: var(--accent); }

    .run-list { overflow-y: auto; flex: 1; }
    .run-item {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }
    .run-item:hover { background: var(--surface); }
    .run-item.active { background: var(--accent-dim); border-left: 2px solid var(--accent); }
    .run-goal { font-size: 12px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .run-meta { font-size: 10px; color: var(--muted); margin-top: 3px; display: flex; gap: 8px; }
    .pill {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 99px;
      font-size: 10px;
    }
    .pill-green { background: #14532d; color: var(--green); }
    .pill-red { background: #450a0a; color: var(--red); }
    .pill-yellow { background: #451a03; color: var(--yellow); }
    .pill-blue { background: var(--accent-dim); color: var(--accent); }

    /* ── Center: Screenshot + Events ── */
    .center-panel { border-right: 1px solid var(--border); display: flex; flex-direction: column; }
    .screenshot-box {
      flex-shrink: 0;
      height: 280px;
      background: #08090e;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    .screenshot-box img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: none;
    }
    .screenshot-box img.visible { display: block; }
    .screenshot-placeholder {
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }
    .screenshot-placeholder .icon { font-size: 32px; margin-bottom: 8px; }
    .screenshot-ts {
      position: absolute;
      bottom: 6px;
      right: 8px;
      font-size: 10px;
      color: var(--muted);
      background: rgba(0,0,0,0.6);
      padding: 2px 6px;
      border-radius: 4px;
    }

    .event-log { flex: 1; overflow-y: auto; padding: 8px 0; }
    .event-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 5px 14px;
      font-size: 11px;
      line-height: 1.5;
      border-bottom: 1px solid transparent;
    }
    .event-row:hover { background: var(--surface); }
    .event-time { color: var(--muted); flex-shrink: 0; width: 52px; }
    .event-icon { flex-shrink: 0; width: 14px; text-align: center; }
    .event-body { flex: 1; word-break: break-all; }
    .event-body .type-tag { font-weight: 700; }
    .ev-start .type-tag { color: var(--accent); }
    .ev-done .type-tag { color: var(--green); }
    .ev-failed .type-tag { color: var(--red); }
    .ev-replan .type-tag { color: var(--yellow); }
    .ev-complete .type-tag { color: var(--green); font-size: 12px; }
    .ev-screenshot { display: none; } /* don't spam log with screenshot events */

    /* ── Right: Run Detail ── */
    .detail-panel { overflow-y: auto; }
    .detail-section { padding: 12px 14px; border-bottom: 1px solid var(--border); }
    .detail-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
    .detail-value { font-size: 12px; word-break: break-all; }
    .detail-goal { font-size: 13px; line-height: 1.5; }
    .task-list { padding: 0; }
    .task-row {
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
    }
    .task-type { font-weight: 600; }
    .task-payload { color: var(--muted); margin-top: 2px; word-break: break-all; }
    .task-status { float: right; }
    .empty-state { padding: 32px 14px; text-align: center; color: var(--muted); font-size: 12px; }

    /* ── Approval Banner ── */
    .approval-banner {
      background: #451a03;
      border: 1px solid var(--yellow);
      border-radius: 6px;
      padding: 12px 14px;
      margin: 8px 14px;
      animation: approval-pulse 2s ease-in-out infinite;
    }
    @keyframes approval-pulse {
      0%, 100% { border-color: var(--yellow); }
      50% { border-color: #f59e0b80; }
    }
    .approval-header {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      color: var(--yellow);
      margin-bottom: 8px;
    }
    .approval-detail {
      font-size: 11px;
      color: var(--text);
      margin-bottom: 4px;
      line-height: 1.5;
    }
    .approval-detail .label {
      color: var(--muted);
      margin-right: 4px;
    }
    .approval-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .btn-approve {
      background: var(--green);
      color: #fff;
      padding: 5px 14px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-family: var(--font);
      font-size: 11px;
      font-weight: 600;
    }
    .btn-approve:hover { opacity: 0.85; }
    .btn-reject {
      background: var(--red);
      color: #fff;
      padding: 5px 14px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-family: var(--font);
      font-size: 11px;
      font-weight: 600;
    }
    .btn-reject:hover { opacity: 0.85; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<header>
  <h1>Agent Orchestrator</h1>
  <span class="badge">Enterprise</span>
  <div id="conn-dot" class="status-dot" title="API connection"></div>
</header>

<div class="layout">

  <!-- ── LEFT: Submit + History ── -->
  <div class="panel left-panel">
    <div class="panel-header">New Run</div>
    <div class="goal-form">
      <textarea id="goal-input" placeholder="输入目标，例如：&#10;open http://example.com and click &quot;More information&quot; and assert text &quot;IANA&quot;"></textarea>
      <div class="form-row">
        <input id="api-key-input" type="text" placeholder="API Key (留空=dev模式)" />
        <button id="submit-btn" class="btn btn-primary" onclick="submitGoal()">运行</button>
      </div>
    </div>

    <!-- Clarification panel (hidden by default) -->
    <div id="clarify-panel" style="display:none;padding:14px;border-bottom:1px solid var(--border);background:#1a1505;">
      <div style="font-size:11px;color:var(--yellow);margin-bottom:8px;font-weight:600;">⚠ 需要澄清</div>
      <div id="clarify-question" style="font-size:12px;color:var(--text);margin-bottom:10px;line-height:1.5;"></div>
      <textarea id="clarify-answer" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--font);font-size:12px;padding:8px;resize:none;height:60px;outline:none;" placeholder="输入你的答案..."></textarea>
      <div style="margin-top:8px;display:flex;gap:8px;">
        <button class="btn btn-primary btn-sm" onclick="submitClarification()">确认</button>
        <button class="btn btn-ghost btn-sm" onclick="dismissClarification()">取消</button>
      </div>
    </div>

    <div class="panel-header">
      History
      <button class="btn btn-ghost btn-sm" style="float:right;margin-top:-2px" onclick="loadHistory()">刷新</button>
    </div>
    <div id="run-list" class="run-list">
      <div class="empty-state">暂无历史记录</div>
    </div>
  </div>

  <!-- ── CENTER: Screenshot + Event Log ── -->
  <div class="panel center-panel">
    <div class="panel-header" id="center-title">实时画面</div>
    <div class="screenshot-box">
      <div class="screenshot-placeholder" id="screenshot-placeholder">
        <div class="icon">🖥️</div>
        <div>等待 agent 工作...</div>
      </div>
      <img id="screenshot-img" alt="agent screenshot" />
      <div id="screenshot-ts" class="screenshot-ts" style="display:none"></div>
      <div id="live-badge" style="display:none;position:absolute;top:8px;right:8px;background:#e53e3e;color:#fff;font-size:11px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:1px;">● LIVE</div>
    </div>
    <div class="panel-header">事件流</div>
    <div id="approval-container"></div>
    <div id="event-log" class="event-log">
      <div class="empty-state">提交目标后，这里会实时显示执行过程</div>
    </div>
  </div>

  <!-- ── RIGHT: Run Detail ── -->
  <div class="panel detail-panel">
    <div class="panel-header">Run Detail</div>
    <div id="run-detail">
      <div class="empty-state">点击左侧历史记录或提交新目标</div>
    </div>
  </div>

</div>

<script>
  let currentRunId = null;
  let pendingClarificationRunId = null;
  let currentSSE = null;
  let apiBase = window.location.origin;

  // ── API Key helpers ──
  function getHeaders() {
    const key = document.getElementById('api-key-input').value.trim();
    const h = { 'Content-Type': 'application/json' };
    if (key) h['x-api-key'] = key;
    return h;
  }

  // ── Connection health check ──
  async function checkHealth() {
    try {
      const r = await fetch(`${apiBase}/health`);
      document.getElementById('conn-dot').className = r.ok ? 'status-dot connected' : 'status-dot';
    } catch {
      document.getElementById('conn-dot').className = 'status-dot';
    }
  }
  setInterval(checkHealth, 5000);
  checkHealth();

  // ── Submit goal ──
  async function submitGoal() {
    const goal = document.getElementById('goal-input').value.trim();
    if (!goal) return;

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = '提交中...';

    clearEventLog();

    try {
      const resp = await fetch(`${apiBase}/api/v1/runs`, {
        method: 'POST',
        headers: getHeaders(),
        body: JSON.stringify({ goal })
      });
      if (!resp.ok) {
        const txt = await resp.text();
        addEvent({ type: 'error', message: `提交失败: ${resp.status} ${txt}` });
        return;
      }
      const data = await resp.json();
      currentRunId = data.runId;

      if (data.status === 'needs_clarification') {
        pendingClarificationRunId = data.runId;
        document.getElementById('clarify-question').textContent = data.question;
        document.getElementById('clarify-panel').style.display = '';
        document.getElementById('clarify-answer').focus();
        addEvent({ type: 'log', message: `Agent 需要澄清: ${data.question}`, timestamp: new Date().toISOString() });
        return;
      }

      document.getElementById('center-title').textContent = `实时画面 — ${currentRunId}`;
      openStream(currentRunId);
      setTimeout(loadHistory, 500);
    } catch (e) {
      addEvent({ type: 'error', message: `网络错误: ${e.message}` });
    } finally {
      btn.disabled = false;
      btn.textContent = '运行';
    }
  }

  // ── Clarification ──
  async function submitClarification() {
    const answer = document.getElementById('clarify-answer').value.trim();
    if (!answer || !pendingClarificationRunId) return;
    try {
      const resp = await fetch(`${apiBase}/api/v1/runs/${pendingClarificationRunId}/clarify`, {
        method: 'POST', headers: getHeaders(), body: JSON.stringify({ answer })
      });
      const data = await resp.json();
      dismissClarification();
      currentRunId = data.runId;
      document.getElementById('center-title').textContent = `实时画面 — ${currentRunId}`;
      addEvent({ type: 'log', message: `目标已澄清，开始执行: ${data.enrichedGoal}`, timestamp: new Date().toISOString() });
      openStream(currentRunId);
      setTimeout(loadHistory, 500);
    } catch(e) { addEvent({ type: 'error', message: e.message, timestamp: new Date().toISOString() }); }
  }

  function dismissClarification() {
    pendingClarificationRunId = null;
    document.getElementById('clarify-panel').style.display = 'none';
    document.getElementById('clarify-answer').value = '';
  }

  // ── SSE Stream ──
  function openStream(runId) {
    if (currentSSE) { currentSSE.close(); currentSSE = null; }

    const url = `${apiBase}/api/v1/runs/${runId}/stream`;
    const es = new EventSource(url);
    currentSSE = es;

    es.onmessage = (e) => {
      let evt;
      try { evt = JSON.parse(e.data); } catch { return; }
      handleEvent(evt);
    };

    es.onerror = () => {
      addEvent({ type: 'error', message: 'SSE 连接断开' });
      es.close();
    };
  }

  let _liveBadgeTimer = null;

  function handleEvent(evt) {
    if (evt.type === 'approval_required' && evt.payload) {
      showApprovalBanner(evt);
      addEvent(evt);
      return;
    }

    if (evt.type === 'screenshot' && evt.screenshotDataUrl) {
      const img = document.getElementById('screenshot-img');
      const ph = document.getElementById('screenshot-placeholder');
      const ts = document.getElementById('screenshot-ts');
      const badge = document.getElementById('live-badge');
      img.src = evt.screenshotDataUrl;
      img.classList.add('visible');
      ph.style.display = 'none';
      ts.style.display = 'block';
      ts.textContent = new Date(evt.timestamp).toLocaleTimeString();
      // Show LIVE badge; hide 3s after last frame
      badge.style.display = 'block';
      clearTimeout(_liveBadgeTimer);
      _liveBadgeTimer = setTimeout(() => { badge.style.display = 'none'; }, 3000);
      return; // don't add to event log
    }

    if (evt.type === 'run_complete') {
      document.getElementById('live-badge').style.display = 'none';
      clearTimeout(_liveBadgeTimer);
      setTimeout(() => { loadHistory(); loadRunDetail(evt.runId || currentRunId); }, 800);
    }

    addEvent(evt);
  }

  // ── Event Log ──
  function clearEventLog() {
    const log = document.getElementById('event-log');
    log.innerHTML = '';
    // reset screenshot
    const img = document.getElementById('screenshot-img');
    img.src = '';
    img.classList.remove('visible');
    document.getElementById('screenshot-placeholder').style.display = '';
    document.getElementById('screenshot-ts').style.display = 'none';
    document.getElementById('live-badge').style.display = 'none';
    clearTimeout(_liveBadgeTimer);
    document.getElementById('center-title').textContent = '实时画面';
  }

  const EVENT_META = {
    task_start:    { icon: '▶', cls: 'ev-start', label: 'START' },
    task_done:     { icon: '✓', cls: 'ev-done',  label: 'DONE' },
    task_failed:   { icon: '✗', cls: 'ev-failed', label: 'FAILED' },
    replan:        { icon: '↺', cls: 'ev-replan', label: 'REPLAN' },
    run_complete:  { icon: '★', cls: 'ev-complete', label: 'COMPLETE' },
    log:           { icon: '·', cls: 'ev-log',    label: 'LOG' },
    error:         { icon: '!', cls: 'ev-failed',  label: 'ERROR' },
    approval_required: { icon: '\u23F8', cls: 'ev-replan', label: 'APPROVAL' },
  };

  function addEvent(evt) {
    const log = document.getElementById('event-log');
    // remove empty state
    const empty = log.querySelector('.empty-state');
    if (empty) empty.remove();

    const meta = EVENT_META[evt.type] || { icon: '·', cls: '', label: evt.type?.toUpperCase() };
    const time = evt.timestamp ? new Date(evt.timestamp).toLocaleTimeString('zh', { hour12: false }) : '';

    let body = `<span class="type-tag">${meta.label}</span> `;
    if (evt.type === 'task_start') {
      body += `<span style="color:#a78bfa">${evt.taskType}</span>`;
      if (evt.payload) {
        const key = evt.payload.selector || evt.payload.url || evt.payload.description || evt.payload.text || '';
        if (key) body += ` <span style="color:#94a3b8">${String(key).slice(0, 60)}</span>`;
      }
    } else if (evt.type === 'task_done') {
      body += `<span style="color:#94a3b8">${evt.summary || ''}</span>`;
      if (evt.durationMs) body += ` <span style="color:#475569">(${evt.durationMs}ms)</span>`;
    } else if (evt.type === 'task_failed') {
      body += `<span style="color:#fca5a5">${(evt.error || '').slice(0, 100)}</span>`;
    } else if (evt.type === 'replan') {
      body += `<span style="color:#fcd34d">${(evt.message || '').slice(0, 100)}</span>`;
    } else if (evt.type === 'run_complete') {
      const ok = evt.success;
      body += ok
        ? `<span style="color:#4ade80">成功完成</span>`
        : `<span style="color:#f87171">运行失败</span>`;
    } else if (evt.message) {
      body += `<span style="color:#94a3b8">${String(evt.message).slice(0, 120)}</span>`;
    }

    const row = document.createElement('div');
    row.className = `event-row ${meta.cls}`;
    row.innerHTML = `
      <span class="event-time">${time}</span>
      <span class="event-icon">${meta.icon}</span>
      <span class="event-body">${body}</span>
    `;
    log.appendChild(row);
    log.scrollTop = log.scrollHeight;
  }

  // ── History ──
  async function loadHistory() {
    try {
      const resp = await fetch(`${apiBase}/api/v1/runs?limit=30`, { headers: getHeaders() });
      if (!resp.ok) return;
      const data = await resp.json();
      renderHistory(data.runs || []);
    } catch {}
  }

  function renderHistory(runs) {
    const el = document.getElementById('run-list');
    if (!runs.length) {
      el.innerHTML = '<div class="empty-state">暂无历史记录</div>';
      return;
    }
    el.innerHTML = runs.map(run => {
      const status = run.result?.success === true ? 'success'
        : run.result?.success === false ? 'failed'
        : run.endedAt ? 'failed' : 'running';
      const pill = status === 'success' ? '<span class="pill pill-green">成功</span>'
        : status === 'failed' ? '<span class="pill pill-red">失败</span>'
        : '<span class="pill pill-yellow">运行中</span>';
      const time = run.startedAt ? new Date(run.startedAt).toLocaleString('zh') : '';
      const active = run.runId === currentRunId ? ' active' : '';
      return `<div class="run-item${active}" onclick="selectRun('${run.runId}')">
        <div class="run-goal">${escHtml(run.goal || '')}</div>
        <div class="run-meta">${pill}<span>${time}</span></div>
      </div>`;
    }).join('');
  }

  function selectRun(runId) {
    currentRunId = runId;
    document.querySelectorAll('.run-item').forEach(el => el.classList.remove('active'));
    event.currentTarget?.classList.add('active');
    loadRunDetail(runId);
    clearEventLog();
    openStream(runId);
  }

  // ── Run Detail ──
  async function loadRunDetail(runId) {
    if (!runId) return;
    try {
      const resp = await fetch(`${apiBase}/api/v1/runs/${runId}`, { headers: getHeaders() });
      if (!resp.ok) return;
      const run = await resp.json();
      renderDetail(run);
    } catch {}
  }

  function renderDetail(run) {
    const el = document.getElementById('run-detail');
    const status = run.result?.success === true ? '<span class="pill pill-green">成功</span>'
      : run.result?.success === false ? '<span class="pill pill-red">失败</span>'
      : '<span class="pill pill-yellow">运行中</span>';

    const tasks = (run.tasks || []).map(t => {
      const sc = t.status === 'done' ? 'pill-green' : t.status === 'failed' ? 'pill-red' : 'pill-yellow';
      const payload = Object.entries(t.payload || {})
        .map(([k,v]) => `${k}: ${String(v).slice(0,50)}`).join(', ');
      return `<div class="task-row">
        <span class="task-type" style="color:#a78bfa">${t.type}</span>
        <span class="task-status"><span class="pill ${sc}">${t.status}</span></span>
        <div class="task-payload">${escHtml(payload)}</div>
      </div>`;
    }).join('');

    el.innerHTML = `
      <div class="detail-section">
        <div class="detail-label">Run ID</div>
        <div class="detail-value" style="color:#64748b;font-size:10px">${run.runId || ''}</div>
      </div>
      <div class="detail-section">
        <div class="detail-label">状态</div>
        <div>${status}</div>
      </div>
      <div class="detail-section">
        <div class="detail-label">目标</div>
        <div class="detail-goal">${escHtml(run.goal || '')}</div>
      </div>
      <div class="detail-section">
        <div class="detail-label">规划器</div>
        <div class="detail-value">${run.plannerUsed || '-'}</div>
      </div>
      <div class="detail-section">
        <div class="detail-label">任务列表 (${(run.tasks||[]).length})</div>
      </div>
      <div class="task-list">${tasks || '<div class="empty-state">无任务</div>'}</div>
    `;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Enter key submit ──
  document.getElementById('goal-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) submitGoal();
  });

  // ── Approval Gate ──
  function makeDetailRow(label, value) {
    const div = document.createElement('div');
    div.className = 'approval-detail';
    const span = document.createElement('span');
    span.className = 'label';
    span.textContent = label;
    div.appendChild(span);
    div.appendChild(document.createTextNode(value));
    return div;
  }

  function showApprovalBanner(evt) {
    const container = document.getElementById('approval-container');
    const approvalId = evt.payload.approvalId;
    const reason = evt.payload.reason || '';
    const taskPayload = evt.payload.taskPayload || {};
    const payloadStr = Object.entries(taskPayload)
      .map(function(pair) { return pair[0] + ': ' + String(pair[1]).slice(0,80); })
      .join(', ');

    const banner = document.createElement('div');
    banner.className = 'approval-banner';
    banner.id = 'approval-' + approvalId;

    const headerDiv = document.createElement('div');
    headerDiv.className = 'approval-header';
    headerDiv.textContent = 'Approval Required';
    banner.appendChild(headerDiv);

    banner.appendChild(makeDetailRow('Task: ', evt.taskType || ''));
    banner.appendChild(makeDetailRow('Reason: ', reason));
    if (payloadStr) banner.appendChild(makeDetailRow('Payload: ', payloadStr));

    const actionsDiv = document.createElement('div');
    actionsDiv.className = 'approval-actions';

    const approveBtn = document.createElement('button');
    approveBtn.className = 'btn-approve';
    approveBtn.textContent = 'Approve';
    approveBtn.addEventListener('click', function() { respondApproval(approvalId, true); });

    const rejectBtn = document.createElement('button');
    rejectBtn.className = 'btn-reject';
    rejectBtn.textContent = 'Reject';
    rejectBtn.addEventListener('click', function() { respondApproval(approvalId, false); });

    actionsDiv.appendChild(approveBtn);
    actionsDiv.appendChild(rejectBtn);
    banner.appendChild(actionsDiv);

    container.prepend(banner);
  }

  async function respondApproval(approvalId, approved) {
    var banner = document.getElementById('approval-' + approvalId);
    try {
      var resp = await fetch(apiBase + '/api/v1/approvals/' + approvalId + '/respond', {
        method: 'POST',
        headers: getHeaders(),
        body: JSON.stringify({ approved: approved })
      });
      if (!resp.ok) {
        var txt = await resp.text();
        addEvent({ type: 'error', message: 'Approval response failed: ' + resp.status + ' ' + txt, timestamp: new Date().toISOString() });
        return;
      }
      if (banner) banner.remove();
      addEvent({
        type: 'log',
        message: (approved ? 'Task approved' : 'Task rejected') + ' (' + approvalId.slice(0,8) + ')',
        timestamp: new Date().toISOString()
      });
    } catch (e) {
      addEvent({ type: 'error', message: 'Approval error: ' + e.message, timestamp: new Date().toISOString() });
    }
  }

  // ── Init ──
  loadHistory();
  setInterval(loadHistory, 10000);
</script>
</body>
</html>
